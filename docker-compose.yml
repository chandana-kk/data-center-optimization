services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neurodc
      POSTGRES_USER: neurodc
      POSTGRES_PASSWORD: neurodc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurodc -d neurodc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://neurodc:neurodc@postgres:5432/neurodc
      JWT_SECRET: change-me-in-production
      DEMO_DATA_RECORDS: 100000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
